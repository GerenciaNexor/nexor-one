[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = [
  "npm install -g pnpm@9",
  "pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @nexor/api exec prisma generate",
  "pnpm --filter api build"
]

[start]
cmd = "pnpm --filter @nexor/api exec prisma migrate deploy && node apps/api/dist/app.js"
