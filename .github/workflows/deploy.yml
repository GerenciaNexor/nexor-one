name: Deploy

on:
  push:
    branches: [main]

jobs:
  # Railway detecta el push a main automáticamente via integración nativa de GitHub.
  # No se necesita un job aquí — configurar en Railway UI:
  #   Proyecto → Servicio API → Settings → Source → conectar repo → branch: main

  deploy-web:
    name: Deploy Web → Vercel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar pnpm
        uses: pnpm/action-setup@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Deploy a Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
