name: Backup semanal DB produccion

on:
  # Todos los domingos a las 02:00 UTC
  schedule:
    - cron: '0 2 * * 0'
  # Permite ejecutar manualmente desde GitHub Actions → Run workflow
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump → GitHub Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar cliente PostgreSQL
        run: sudo apt-get install -y postgresql-client

      - name: Generar backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
        run: |
          mkdir -p backups
          TIMESTAMP=$(date +"%Y%m%d_%H%M%S")
          FILENAME="nexor_${TIMESTAMP}.dump"
          pg_dump \
            "$DATABASE_URL" \
            --format=custom \
            --no-acl \
            --no-owner \
            --file="backups/${FILENAME}"
          echo "BACKUP_FILE=${FILENAME}" >> "$GITHUB_ENV"
          echo "✅ Backup generado: ${FILENAME} ($(du -sh backups/${FILENAME} | cut -f1))"

      - name: Verificar integridad del backup
        run: |
          COUNT=$(pg_restore --list "backups/$BACKUP_FILE" | wc -l)
          echo "✅ Objetos en el backup: ${COUNT}"
          if [ "$COUNT" -lt 10 ]; then
            echo "❌ El backup parece estar vacio o corrupto."
            exit 1
          fi

      - name: Subir backup como artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ env.BACKUP_FILE }}
          path: backups/${{ env.BACKUP_FILE }}
          # Retener 90 dias (maximo en GitHub gratuito)
          retention-days: 90
          if-no-files-found: error

      - name: Notificar resultado por email
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL:   ${{ secrets.BACKUP_NOTIFY_EMAIL }}
          JOB_STATUS:     ${{ job.status }}
          RUN_URL:        ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            SUBJECT="✅ Backup NEXOR completado — $BACKUP_FILE"
            BODY="El backup semanal de producción se generó correctamente.\n\nArchivo: ${BACKUP_FILE}\nFecha: $(date -u '+%Y-%m-%d %H:%M UTC')\nEjecución: ${RUN_URL}"
          else
            SUBJECT="❌ Backup NEXOR FALLÓ — $(date -u '+%Y-%m-%d')"
            BODY="El backup semanal de producción FALLÓ.\n\nFecha: $(date -u '+%Y-%m-%d %H:%M UTC')\nEjecución: ${RUN_URL}\n\nRevisa los logs para más detalles."
          fi
          curl -s -X POST "https://api.resend.com/emails" \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"from\": \"NEXOR Ops <no-reply@nexor.co>\",
              \"to\": [\"${NOTIFY_EMAIL}\"],
              \"subject\": \"${SUBJECT}\",
              \"text\": \"${BODY}\"
            }"
